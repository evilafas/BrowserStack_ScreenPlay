# ═══════════════════════════════════════════════════════════
# SonarQube - Configuración del Proyecto BrowserStack ScreenPlay
# Gobierno de Automatización Telefónica - Análisis Estático
# ═══════════════════════════════════════════════════════════

# Identificación del proyecto
sonar.projectKey=browserstack-screenplay
sonar.projectName=BrowserStack ScreenPlay - Automatización Telefónica
sonar.projectVersion=1.0.0

# ── Conexión al servidor SonarQube (Docker local) ──────────
sonar.host.url=http://localhost:9000
sonar.token=

# ── Código fuente ──────────────────────────────────────────
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21
sonar.java.target=21
sonar.sourceEncoding=UTF-8

# ── Binarios compilados ────────────────────────────────────
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test
sonar.java.libraries=build/libs/*.jar

# ── Reportes de cobertura y análisis ─────────────────────────
sonar.junit.reportPaths=build/test-results/test
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# ── Checkstyle ────────────────────────────────────────────
sonar.java.checkstyle.reportPaths=build/reports/checkstyle/main.xml,build/reports/checkstyle/test.xml

# ── PMD ───────────────────────────────────────────────────
sonar.java.pmd.reportPaths=build/reports/pmd/main.xml,build/reports/pmd/test.xml

# ── SpotBugs ──────────────────────────────────────────────
sonar.java.spotbugs.reportPaths=build/reports/spotbugs/main.xml,build/reports/spotbugs/test.xml

# ── Exclusiones ──────────────────────────────────────────────
# Excluir clases generadas y código de infraestructura auxiliar
sonar.exclusions=\
  **/build/**,\
  **/target/**,\
  **/hlm-postgres-data/**,\
  **/.idea/**

# Excluir tests del análisis de cobertura de producción
sonar.coverage.exclusions=\
  src/test/**,\
  **/runners/**,\
  **/stepDefinitions/**,\
  **/HealeniumBaseTest.java,\
  **/WebDriverHooks.java

# ── Quality Gate ──────────────────────────────────────────────
# Configurado en el servidor SonarQube (portal web)
# Por defecto: Sonar way gate
