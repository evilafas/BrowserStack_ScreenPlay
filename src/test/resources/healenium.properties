# Numero de intentos de recuperacion antes de fallar definitivamente
recovery-tries=1

# Score minimo de similitud para aceptar un elemento como valido (0.0 - 1.0)
score-cap=.6

# Habilitar/deshabilitar el self-healing
heal-enabled=true

# Conexion al backend de Healenium (debe estar corriendo via docker-compose up -d)
hlm.server.host=localhost
hlm.server.port=7878
