services:

  # ═══════════════════════════════════════════════════════════
  # HEALENIUM — Self-Healing para Selenium
  # ═══════════════════════════════════════════════════════════

  healenium-db:
    image: postgres:14-alpine
    container_name: healenium-db
    environment:
      POSTGRES_DB: healenium
      POSTGRES_USER: healenium_user
      POSTGRES_PASSWORD: YBMSDb
    volumes:
      - ./hlm-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healenium_user -d healenium"]
      interval: 10s
      timeout: 5s
      retries: 5

  hlm-selector-imitator:
    image: healenium/hlm-selector-imitator:1.6
    container_name: hlm-selector-imitator
    ports:
      - "8000:8000"

  healenium:
    image: healenium/hlm-backend:3.4.4
    container_name: healenium-backend
    depends_on:
      healenium-db:
        condition: service_healthy
      hlm-selector-imitator:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://healenium-db:5432/healenium
      SPRING_DATASOURCE_USERNAME: healenium_user
      SPRING_DATASOURCE_PASSWORD: YBMSDb
      SERVER_PORT: 7878
      RECOVERY_TRIES: 1
      SCORE_CAP: "0.6"
      HEAL_ENABLED: "true"
      HLM_IMITATOR_HOST: hlm-selector-imitator
      HLM_IMITATOR_PORT: 8000
    ports:
      - "7878:7878"

  # ═══════════════════════════════════════════════════════════
  # SONARQUBE — Plataforma de Calidad de Código (Análisis Estático)
  # ═══════════════════════════════════════════════════════════

  sonarqube-db:
    image: postgres:14-alpine
    container_name: sonarqube-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_pass
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
      - ./docker/sonar-init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sonar-net

  sonarqube:
    image: sonarqube:10.4-community
    container_name: sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_pass
      SONAR_WEB_PORT: 9000
      # Incrementar memoria para análisis de proyectos grandes
      SONAR_CE_JAVAOPTS: "-Xmx1g -Xms256m"
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms128m"
      SONAR_SEARCH_JAVAOPTS: "-Xmx512m -Xms512m"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - sonar-net

# ═══════════════════════════════════════════════════════════
# VOLÚMENES — Persistencia de datos SonarQube
# ═══════════════════════════════════════════════════════════
volumes:
  sonarqube_db_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local

# ═══════════════════════════════════════════════════════════
# REDES
# ═══════════════════════════════════════════════════════════
networks:
  sonar-net:
    driver: bridge
